name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  terraform:
    name: fmt · tflint · validate · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ">=1.7.0"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: TFLint init
        run: tflint --init

      - name: Validate and lint
        run: |
          set -euo pipefail
          terraform init -backend=false
          terraform validate
          tflint --config="$GITHUB_WORKSPACE/.tflint.hcl" )


  sast:
    name: SAST (Trivy + Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy config scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
      - name: Checkov scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          skip_check: CKV_AWS_237,CKV_AWS_120,CKV_AWS_225,CKV2_AWS_5,CKV2_AWS_29,CKV_AWS_144,CKV2_AWS_51,CKV2_AWS_57,CKV2_AWS_62
          quiet: true
          compact: true
